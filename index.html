<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="revstyle.css">
</head>

<body>
    <div class="container">

        <div class="apply_box">
            <h1>Job Application</h1>
            <span>(Web)</span>
            <form action="/action">

                <div class="form_container">
                    <div class="form_control">
                        <label for="fname">First Name</label>
                        <input type="text" placeholder="Enter First Name..." id="fname">
                    </div>
                    <div class="form_control">
                        <label for="lname">Last Name</label>
                        <input type="text" placeholder="Enter Last Name..." id="lname">
                    </div>
                    <div class="form_control">
                        <label for="email">Email</label>
                        <input type="email" placeholder="Enter Email..." id="email">
                    </div>
                    <div class="form_control">
                        <label for="jobRole">Job Role</label>
                        <select name="jobrole" id="jobRole">
                            <option value="none">Select Job Role</option>
                            <option value="Fronted">Frontend Developer</option>
                            <option value="Backend">Backend Developer</option>
                            <option value="FullStack">FullStack Developer</option>
                            <option value="UI/UX">UI UX Developer</option>
                        </select>
                    </div>
                    <div class="textarea_control">
                        <label for="address">Address</label>
                        <textarea name="address" id="address"></textarea>
                    </div>
                    <div class="form_control">
                        <label for="city">City</label>
                        <input type="text" placeholder="Enter City Name..." id="city">
                    </div>
                    <div class="form_control">
                        <label for="pincode">Pincode</label>
                        <input type="number" id="pincode" placeholder="Enter Pincode...">
                    </div>
                    <div class="form_control">
                        <label for="sdate">Start Date</label>
                        <input type="date" id="sdate">
                    </div>
                    <div class="form_control">
                        <label for="cv">Upload your CV</label>
                        <input type="file" id="cv">
                    </div>
                </div>

                <div class="button_container">
                    <button type="submit">Apply Now</button>
                </div>

            </form>

        </div>

    </div>
</body>

</html>
